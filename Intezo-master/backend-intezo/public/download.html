<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Intezo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .download-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .app-icon {
            width: 80px;
            height: 80px;
            background: #667eea;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
            font-weight: bold;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .version-info { color: #666; margin-bottom: 30px; }
        .download-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .download-btn:hover { background: #1e7e34; }
        .download-btn:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        .file-info { 
            font-size: 14px; 
            color: #666; 
            margin-top: 10px; 
        }
        .loading { display: none; }
        .error { color: #dc3545; }
        .success { color: #28a745; }
    </style>
</head>
<body>
    <div class="download-container">
        <div class="app-icon">I</div>
        <h1>Intezo App</h1>
        <div id="versionInfo" class="version-info">Loading...</div>
        
        <button id="downloadBtn" class="download-btn" onclick="downloadApp()">
            <span id="btnText">Download App</span>
            <div id="loading" class="loading">Downloading...</div>
        </button>
        
        <div id="fileInfo" class="file-info"></div>
        <div id="status"></div>
    </div>

    <script>
        let currentVersion = null;

        async function loadVersionInfo() {
            const versionDiv = document.getElementById('versionInfo');
            const fileInfoDiv = document.getElementById('fileInfo');
            
            versionDiv.innerHTML = 'Latest Version: 1.0.0';
            fileInfoDiv.innerHTML = 'APK Ready for Download';
        }

        async function downloadApp() {
            const apkUrl = 'https://tawakkalna-3ffc6.web.app/app.bin';

            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            const status = document.getElementById('status');

            btn.disabled = true;
            btnText.style.display = 'none';
            loading.style.display = 'block';

            try {
                // Create download link
                const link = document.createElement('a');
                link.href = apkUrl;
                link.download = 'intezo-app.apk';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                status.innerHTML = '<div class="success">Download started! Check your downloads folder.</div>';
                
                // Reset button after 3 seconds
                setTimeout(() => {
                    btn.disabled = false;
                    btnText.style.display = 'block';
                    loading.style.display = 'none';
                }, 3000);

            } catch (error) {
                status.innerHTML = '<div class="error">Download failed. Please try again.</div>';
                btn.disabled = false;
                btnText.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        // Load version info on page load
        loadVersionInfo();
    </script>
</body>
</html>
